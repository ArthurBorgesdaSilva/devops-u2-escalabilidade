apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-escalavel
  labels:
    app: app-escalavel
spec:
  replicas: 3  # múltiplas réplicas para alta disponibilidade
  selector:
    matchLabels:
      app: app-escalavel
  template:
    metadata:
      labels:
        app: app-escalavel
    spec:
      restartPolicy: Always  # garante reinício automático em falhas
      containers:
        - name: nginx-app
          image: nginx:stable
          ports:
            - containerPort: 80
          # Liveness probe: verifica se o container está "vivo"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          # Readiness probe: verifica se o container está pronto para receber tráfego
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
