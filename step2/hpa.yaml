apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: app-escalavel-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: app-escalavel   # nome do deployment
  minReplicas: 2          # mínimo de réplicas
  maxReplicas: 5          # máximo de réplicas
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50  # alvo de 50% de uso de CPU